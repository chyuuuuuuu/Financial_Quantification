<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六月 Top20 回测</title>
    <style>
        :root {
            --bg: #f3f6f8;
            --panel: #ffffff;
            --panel-2: #f8fafc;
            --line: #d9e0e8;
            --text: #17212b;
            --muted: #647284;
            --red: #d84a4a;
            --green: #15835b;
            --blue: #2563eb;
            --teal: #0f766e;
            --amber: #b7791f;
            --shadow: 0 8px 24px rgba(23, 33, 43, 0.08);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
            background: var(--bg);
            color: var(--text);
        }
        .shell {
            max-width: 1520px;
            margin: 0 auto;
            padding: 16px;
        }
        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        h1 {
            margin: 0;
            font-size: 22px;
            letter-spacing: 0;
        }
        .sub {
            color: var(--muted);
            margin-top: 3px;
            font-size: 13px;
        }
        a {
            color: var(--teal);
            text-decoration: none;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(6, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        .card, .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .card {
            padding: 12px;
            min-height: 78px;
        }
        .k {
            color: var(--muted);
            font-size: 12px;
        }
        .v {
            margin-top: 5px;
            font-size: 22px;
            font-weight: 760;
            line-height: 1.15;
        }
        .up { color: var(--red); }
        .down { color: var(--green); }
        .neutral { color: var(--muted); }
        .grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .panel h2 {
            margin: 0;
            padding: 11px 13px;
            border-bottom: 1px solid var(--line);
            background: var(--panel-2);
            font-size: 15px;
        }
        .body { padding: 12px; }
        canvas {
            display: block;
            width: 100%;
            height: 320px;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        select, input {
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            padding: 8px 9px;
            color: var(--text);
            font-size: 13px;
        }
        .table-wrap {
            overflow: auto;
            max-height: 560px;
            border: 1px solid var(--line);
            border-radius: 8px;
        }
        table {
            border-collapse: collapse;
            min-width: 1180px;
            width: 100%;
            font-size: 12.5px;
        }
        th, td {
            padding: 7px 8px;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
            text-align: left;
        }
        th {
            position: sticky;
            top: 0;
            background: var(--panel-2);
            color: var(--muted);
            z-index: 1;
        }
        .heat {
            display: grid;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .heat-row {
            display: grid;
            grid-template-columns: 92px repeat(20, 38px);
            gap: 4px;
            align-items: center;
        }
        .heat-label {
            color: var(--muted);
            font-size: 12px;
        }
        .cell {
            height: 28px;
            border-radius: 5px;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 700;
        }
        .legend {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            font-size: 12px;
            margin-top: 8px;
        }
        .dot {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            display: inline-block;
        }
        .error {
            padding: 12px;
            border: 1px solid #efb3b3;
            background: #fff2f2;
            color: #9b1c1c;
            border-radius: 8px;
        }
        @media (max-width: 980px) {
            .shell { padding: 10px; }
            .topbar { align-items: flex-start; flex-direction: column; }
            .cards { grid-template-columns: repeat(2, 1fr); }
            .grid { grid-template-columns: 1fr; }
            canvas { height: 260px; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="topbar">
        <div>
            <h1>六月每日 Top20 回测</h1>
            <div class="sub" id="subtitle">加载中...</div>
        </div>
        <a href="/uptrend">单股分析</a>
    </div>

    <div id="error"></div>

    <div class="cards">
        <div class="card"><div class="k">交易日</div><div class="v" id="days">-</div></div>
        <div class="card"><div class="k">Top20 记录</div><div class="v" id="rows">-</div></div>
        <div class="card"><div class="k">三日均值</div><div class="v" id="avg3">-</div></div>
        <div class="card"><div class="k">三日胜率</div><div class="v" id="win3">-</div></div>
        <div class="card"><div class="k">最佳单票</div><div class="v" id="best">-</div></div>
        <div class="card"><div class="k">最差单票</div><div class="v" id="worst">-</div></div>
    </div>

    <div class="grid">
        <section class="panel">
            <h2>每日 Top20 平均三日收益</h2>
            <div class="body"><canvas id="dailyChart"></canvas></div>
        </section>
        <section class="panel">
            <h2>信号类型表现</h2>
            <div class="body"><canvas id="signalChart"></canvas></div>
        </section>
    </div>

    <section class="panel" style="margin-bottom:12px;">
        <h2>每日排名热力图</h2>
        <div class="body">
            <div id="heatmap" class="heat"></div>
            <div class="legend">
                <span><i class="dot" style="background:#15835b"></i> 下跌</span>
                <span><i class="dot" style="background:#d84a4a"></i> 上涨</span>
                <span>格子数值为未来 3 个交易日收盘收益</span>
            </div>
        </div>
    </section>

    <section class="panel">
        <h2>Top20 明细</h2>
        <div class="body">
            <div class="toolbar">
                <select id="dateFilter"></select>
                <select id="signalFilter"></select>
                <input id="search" placeholder="代码或名称">
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>日期</th><th>排名</th><th>代码</th><th>名称</th><th>信号</th>
                        <th>分数</th><th>收盘</th><th>1日</th><th>2日</th><th>3日</th>
                        <th>3日高点</th><th>3日低点</th><th>理由</th>
                    </tr>
                    </thead>
                    <tbody id="rowsBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<script>
const fmt = (v, d = 2) => Number.isFinite(Number(v)) ? Number(v).toFixed(d) : '-';
const cls = v => Number(v) > 0 ? 'up' : Number(v) < 0 ? 'down' : 'neutral';
const pct = v => Number.isFinite(Number(v)) ? `${Number(v).toFixed(2)}%` : '-';

async function loadData() {
    const urls = [
        new URL('/api/june-backtest', location.origin).href,
        new URL('./reports/june_top20_backtest.json', location.href).href,
        new URL('/static/reports/june_top20_backtest.json', location.origin).href
    ];
    let lastError = null;
    for (const url of urls) {
        try {
            const res = await fetch(url, {cache: 'no-store'});
            if (res.ok) return await res.json();
            lastError = new Error(`${url} ${res.status}`);
        } catch (err) {
            lastError = err;
        }
    }
    throw lastError || new Error('无法加载回测数据');
}

function drawBarLine(canvas, labels, bars, line, opts = {}) {
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(rect.width * ratio));
    canvas.height = Math.max(1, Math.floor(rect.height * ratio));
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    const w = rect.width, h = rect.height;
    ctx.clearRect(0, 0, w, h);
    const pad = {l: 42, r: 18, t: 16, b: 42};
    const vals = bars.concat(line || []).filter(v => Number.isFinite(Number(v))).map(Number);
    const maxAbs = Math.max(1, ...vals.map(v => Math.abs(v))) * 1.18;
    const y = v => pad.t + (maxAbs - v) / (maxAbs * 2) * (h - pad.t - pad.b);
    const zeroY = y(0);
    ctx.strokeStyle = '#d9e0e8';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(pad.l, zeroY);
    ctx.lineTo(w - pad.r, zeroY);
    ctx.stroke();
    ctx.fillStyle = '#647284';
    ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
    ctx.fillText(`${maxAbs.toFixed(1)}%`, 4, y(maxAbs) + 4);
    ctx.fillText(`-${maxAbs.toFixed(1)}%`, 4, y(-maxAbs) + 4);
    const bw = (w - pad.l - pad.r) / Math.max(1, labels.length);
    bars.forEach((v, i) => {
        const value = Number(v);
        const x = pad.l + i * bw + bw * 0.18;
        const barW = Math.max(8, bw * 0.58);
        const top = y(Math.max(0, value));
        const bottom = y(Math.min(0, value));
        ctx.fillStyle = value >= 0 ? '#d84a4a' : '#15835b';
        ctx.fillRect(x, top, barW, Math.max(2, bottom - top));
        ctx.save();
        ctx.translate(pad.l + i * bw + bw * 0.5, h - 8);
        ctx.rotate(-Math.PI / 5);
        ctx.fillStyle = '#647284';
        ctx.fillText(labels[i].slice(5), -18, 0);
        ctx.restore();
    });
    if (line && line.length) {
        ctx.strokeStyle = opts.lineColor || '#2563eb';
        ctx.lineWidth = 2;
        ctx.beginPath();
        line.forEach((v, i) => {
            const x = pad.l + i * bw + bw * 0.5;
            const yy = y(Number(v));
            if (i === 0) ctx.moveTo(x, yy); else ctx.lineTo(x, yy);
        });
        ctx.stroke();
    }
}

function renderHeatmap(rows) {
    const root = document.getElementById('heatmap');
    const byDate = new Map();
    rows.forEach(r => {
        if (!byDate.has(r.latest_date)) byDate.set(r.latest_date, []);
        byDate.get(r.latest_date).push(r);
    });
    root.innerHTML = '';
    for (const [date, items] of byDate) {
        const row = document.createElement('div');
        row.className = 'heat-row';
        const label = document.createElement('div');
        label.className = 'heat-label';
        label.textContent = date.slice(5);
        row.appendChild(label);
        items.sort((a, b) => a.rank - b.rank).slice(0, 20).forEach(item => {
            const v = Number(item.ret_3d_pct);
            const cell = document.createElement('div');
            cell.className = 'cell';
            const alpha = Math.min(1, Math.abs(v) / 12);
            cell.style.background = v >= 0
                ? `rgba(216,74,74,${0.28 + alpha * 0.72})`
                : `rgba(21,131,91,${0.28 + alpha * 0.72})`;
            cell.title = `${item.rank}. ${item.code} ${item.name} ${pct(v)}`;
            cell.textContent = Number.isFinite(v) ? v.toFixed(1) : '-';
            row.appendChild(cell);
        });
        root.appendChild(row);
    }
}

function renderTable(rows) {
    const date = document.getElementById('dateFilter').value;
    const signal = document.getElementById('signalFilter').value;
    const q = document.getElementById('search').value.trim();
    const body = document.getElementById('rowsBody');
    const filtered = rows.filter(r => {
        if (date && r.latest_date !== date) return false;
        if (signal && r.signal_type !== signal) return false;
        if (q && !(String(r.code).includes(q) || String(r.name).includes(q))) return false;
        return true;
    });
    body.innerHTML = filtered.map(r => `
        <tr>
            <td>${r.latest_date}</td>
            <td>${r.rank}</td>
            <td>${r.code}</td>
            <td>${r.name}</td>
            <td>${r.signal_type}</td>
            <td>${fmt(r.final_score)}</td>
            <td>${fmt(r.close)}</td>
            <td class="${cls(r.ret_1d_pct)}">${pct(r.ret_1d_pct)}</td>
            <td class="${cls(r.ret_2d_pct)}">${pct(r.ret_2d_pct)}</td>
            <td class="${cls(r.ret_3d_pct)}">${pct(r.ret_3d_pct)}</td>
            <td class="${cls(r.high_3d_pct)}">${pct(r.high_3d_pct)}</td>
            <td class="${cls(r.low_3d_pct)}">${pct(r.low_3d_pct)}</td>
            <td>${r.reason || ''}</td>
        </tr>
    `).join('');
}

function fillFilters(data) {
    const dates = [...new Set(data.top_rows.map(r => r.latest_date))];
    const signals = [...new Set(data.top_rows.map(r => r.signal_type))];
    document.getElementById('dateFilter').innerHTML = '<option value="">全部日期</option>' + dates.map(d => `<option>${d}</option>`).join('');
    document.getElementById('signalFilter').innerHTML = '<option value="">全部信号</option>' + signals.map(s => `<option>${s}</option>`).join('');
}

function render(data) {
    const rows = data.top_rows || [];
    const retRows = rows.filter(r => Number.isFinite(Number(r.ret_3d_pct)));
    const avg = retRows.reduce((s, r) => s + Number(r.ret_3d_pct), 0) / Math.max(1, retRows.length);
    const win = retRows.filter(r => Number(r.ret_3d_pct) > 0).length / Math.max(1, retRows.length) * 100;
    const best = retRows.slice().sort((a, b) => Number(b.ret_3d_pct) - Number(a.ret_3d_pct))[0];
    const worst = retRows.slice().sort((a, b) => Number(a.ret_3d_pct) - Number(b.ret_3d_pct))[0];
    document.getElementById('subtitle').textContent =
        `${data.start} 至 ${data.end}，每日 Top${data.top_n}，向后 ${data.forward_days} 个交易日，生成于 ${data.generated_at}`;
    document.getElementById('days').textContent = data.trading_days.length;
    document.getElementById('rows').textContent = rows.length;
    document.getElementById('avg3').textContent = pct(avg);
    document.getElementById('avg3').className = `v ${cls(avg)}`;
    document.getElementById('win3').textContent = pct(win);
    document.getElementById('best').textContent = best ? `${best.code} ${pct(best.ret_3d_pct)}` : '-';
    document.getElementById('best').className = 'v up';
    document.getElementById('worst').textContent = worst ? `${worst.code} ${pct(worst.ret_3d_pct)}` : '-';
    document.getElementById('worst').className = 'v down';
    fillFilters(data);
    renderHeatmap(rows);
    renderTable(rows);
    const daily = data.daily_summary || [];
    drawBarLine(
        document.getElementById('dailyChart'),
        daily.map(r => r.date),
        daily.map(r => Number(r.mean_ret_3d_pct)),
        daily.map(r => Number(r.benchmark_mean_3d_pct)),
        {lineColor: '#2563eb'}
    );
    const signal = data.signal_summary || [];
    drawBarLine(
        document.getElementById('signalChart'),
        signal.map(r => r.signal_type.replace('_', ' ')),
        signal.map(r => Number(r.mean_ret_3d_pct)),
        signal.map(r => Number(r.win_rate_pct) / 10),
        {lineColor: '#b7791f'}
    );
    ['dateFilter', 'signalFilter', 'search'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => renderTable(rows));
    });
    window.addEventListener('resize', () => {
        drawBarLine(document.getElementById('dailyChart'), daily.map(r => r.date), daily.map(r => Number(r.mean_ret_3d_pct)), daily.map(r => Number(r.benchmark_mean_3d_pct)));
        drawBarLine(document.getElementById('signalChart'), signal.map(r => r.signal_type.replace('_', ' ')), signal.map(r => Number(r.mean_ret_3d_pct)), signal.map(r => Number(r.win_rate_pct) / 10), {lineColor: '#b7791f'});
    });
}

loadData().then(render).catch(err => {
    document.getElementById('subtitle').textContent = '加载失败';
    document.getElementById('error').innerHTML = `<div class="error">${err.message || err}</div>`;
});
</script>
</body>
</html>
