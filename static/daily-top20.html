<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日 Top20 选股</title>
    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #fff;
            --soft: #f8fafc;
            --line: #dbe3eb;
            --text: #14212f;
            --muted: #657387;
            --red: #d94b4b;
            --green: #14845d;
            --blue: #2563eb;
            --amber: #a76813;
            --shadow: 0 8px 22px rgba(20, 33, 47, .07);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
        }
        .shell { max-width: 1540px; margin: 0 auto; padding: 16px; }
        .topbar {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }
        h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
        .sub { margin-top: 4px; color: var(--muted); font-size: 13px; }
        .badge {
            display: inline-flex;
            align-items: center;
            min-height: 30px;
            padding: 6px 10px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--panel);
            color: var(--muted);
            font-size: 13px;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(6, minmax(130px, 1fr));
            gap: 10px;
            margin-bottom: 12px;
        }
        .card, .panel {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }
        .card { padding: 12px; min-height: 78px; }
        .k { color: var(--muted); font-size: 12px; }
        .v { margin-top: 6px; font-size: 21px; font-weight: 760; line-height: 1.12; }
        .up { color: var(--red); }
        .down { color: var(--green); }
        .neutral { color: var(--muted); }
        .grid {
            display: grid;
            grid-template-columns: .9fr 1.1fr;
            gap: 12px;
            margin-bottom: 12px;
        }
        .panel h2 {
            margin: 0;
            padding: 11px 13px;
            border-bottom: 1px solid var(--line);
            background: var(--soft);
            font-size: 15px;
        }
        .body { padding: 12px; }
        canvas { display: block; width: 100%; height: 260px; }
        .analysis {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }
        .note {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 11px;
            background: #fff;
            min-height: 78px;
        }
        .note .title { font-size: 12px; color: var(--muted); margin-bottom: 5px; }
        .note .text { font-size: 14px; line-height: 1.45; }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        input, select {
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #fff;
            padding: 8px 9px;
            font-size: 13px;
            color: var(--text);
        }
        .table-wrap {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: auto;
            max-height: 620px;
        }
        table {
            border-collapse: collapse;
            min-width: 1380px;
            width: 100%;
            font-size: 12.5px;
        }
        th, td {
            padding: 7px 8px;
            border-bottom: 1px solid var(--line);
            white-space: nowrap;
            text-align: left;
        }
        th {
            position: sticky;
            top: 0;
            z-index: 1;
            background: var(--soft);
            color: var(--muted);
        }
        .reason {
            max-width: 420px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .error {
            padding: 12px;
            border: 1px solid #efb3b3;
            background: #fff2f2;
            color: #9b1c1c;
            border-radius: 8px;
            margin-bottom: 12px;
        }
        @media (max-width: 980px) {
            .shell { padding: 10px; }
            .topbar { flex-direction: column; }
            .cards { grid-template-columns: repeat(2, 1fr); }
            .grid, .analysis { grid-template-columns: 1fr; }
            canvas { height: 230px; }
        }
    </style>
</head>
<body>
<div class="shell">
    <div class="topbar">
        <div>
            <h1>每日 Top20 选股</h1>
            <div class="sub" id="subtitle">加载中...</div>
        </div>
        <div class="badge" id="modelBadge">模型状态</div>
    </div>
    <div id="error"></div>

    <div class="cards">
        <div class="card"><div class="k">快照日期</div><div class="v" id="date">-</div></div>
        <div class="card"><div class="k">候选数量</div><div class="v" id="candidates">-</div></div>
        <div class="card"><div class="k">Top20 均分</div><div class="v" id="avgScore">-</div></div>
        <div class="card"><div class="k">预测次日均值</div><div class="v" id="avgPred">-</div></div>
        <div class="card"><div class="k">近期回测均值</div><div class="v" id="fbAvg">-</div></div>
        <div class="card"><div class="k">近期胜率</div><div class="v" id="fbWin">-</div></div>
    </div>

    <div class="grid">
        <section class="panel">
            <h2>信号分布</h2>
            <div class="body"><canvas id="signalChart"></canvas></div>
        </section>
        <section class="panel">
            <h2>分析</h2>
            <div class="body">
                <div class="analysis">
                    <div class="note"><div class="title">排序口径</div><div class="text" id="rankNote">-</div></div>
                    <div class="note"><div class="title">训练反馈</div><div class="text" id="trainNote">-</div></div>
                    <div class="note"><div class="title">信号结构</div><div class="text" id="signalNote">-</div></div>
                    <div class="note"><div class="title">风险提示</div><div class="text">仅做模型研究和复盘，不构成投资建议；盘中实时重算会导致排名变化，15:30 快照用于留档和训练。</div></div>
                </div>
            </div>
        </section>
    </div>

    <section class="panel">
        <h2>Top20 明细</h2>
        <div class="body">
            <div class="toolbar">
                <select id="signalFilter"></select>
                <input id="search" placeholder="代码或名称">
            </div>
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>排名</th><th>代码</th><th>名称</th><th>信号</th>
                        <th>自适应分</th><th>原始分</th><th>预测次日</th>
                        <th>收盘</th><th>涨跌幅</th><th>成交额</th>
                        <th>进场日</th><th>触发日</th><th>理由</th>
                    </tr>
                    </thead>
                    <tbody id="rowsBody"></tbody>
                </table>
            </div>
        </div>
    </section>
</div>

<script>
const fmt = (v, d = 2) => Number.isFinite(Number(v)) ? Number(v).toFixed(d) : '-';
const pct = v => Number.isFinite(Number(v)) ? `${Number(v).toFixed(2)}%` : '-';
const cls = v => Number(v) > 0 ? 'up' : Number(v) < 0 ? 'down' : 'neutral';

async function loadData() {
    const urls = [
        new URL('/api/daily-top20', location.origin).href,
        new URL('./reports/daily_top20.json', location.href).href,
        new URL('/static/reports/daily_top20.json', location.origin).href
    ];
    let last = null;
    for (const url of urls) {
        try {
            const res = await fetch(url, {cache: 'no-store'});
            if (res.ok) return await res.json();
            last = new Error(`${url} ${res.status}`);
        } catch (err) {
            last = err;
        }
    }
    throw last || new Error('无法加载 daily_top20.json');
}

function drawSignalChart(canvas, rows) {
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const ratio = window.devicePixelRatio || 1;
    canvas.width = Math.max(1, Math.floor(rect.width * ratio));
    canvas.height = Math.max(1, Math.floor(rect.height * ratio));
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    const w = rect.width, h = rect.height;
    ctx.clearRect(0, 0, w, h);
    const pad = {l: 44, r: 16, t: 14, b: 48};
    const max = Math.max(1, ...rows.map(r => Number(r.count) || 0));
    const bw = (w - pad.l - pad.r) / Math.max(1, rows.length);
    ctx.strokeStyle = '#dbe3eb';
    ctx.beginPath();
    ctx.moveTo(pad.l, h - pad.b);
    ctx.lineTo(w - pad.r, h - pad.b);
    ctx.stroke();
    rows.forEach((row, i) => {
        const value = Number(row.count) || 0;
        const x = pad.l + i * bw + bw * .18;
        const barW = Math.max(18, bw * .58);
        const barH = value / max * (h - pad.t - pad.b);
        ctx.fillStyle = i % 2 ? '#2563eb' : '#0f766e';
        ctx.fillRect(x, h - pad.b - barH, barW, barH);
        ctx.fillStyle = '#14212f';
        ctx.font = '12px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.fillText(String(value), x + 2, h - pad.b - barH - 5);
        ctx.save();
        ctx.translate(pad.l + i * bw + bw * .5, h - 8);
        ctx.rotate(-Math.PI / 6);
        ctx.fillStyle = '#657387';
        ctx.fillText(String(row.signal_type).replace('_', ' '), -28, 0);
        ctx.restore();
    });
}

function fillFilters(data) {
    const signals = [...new Set((data.top_rows || []).map(r => r.signal_type || ''))];
    document.getElementById('signalFilter').innerHTML =
        '<option value="">全部信号</option>' + signals.map(s => `<option>${s}</option>`).join('');
}

function renderTable(rows) {
    const signal = document.getElementById('signalFilter').value;
    const q = document.getElementById('search').value.trim();
    const filtered = rows.filter(r => {
        if (signal && r.signal_type !== signal) return false;
        if (q && !(String(r.code).includes(q) || String(r.name).includes(q))) return false;
        return true;
    });
    document.getElementById('rowsBody').innerHTML = filtered.map(r => `
        <tr>
            <td>${r.snapshot_rank || r.rank || ''}</td>
            <td>${r.code}</td>
            <td>${r.name}</td>
            <td>${r.signal_type || ''}</td>
            <td>${fmt(r.adaptive_score)}</td>
            <td>${fmt(r.final_score)}</td>
            <td class="${cls(r.pred_next_day_ret_pct)}">${pct(r.pred_next_day_ret_pct)}</td>
            <td>${fmt(r.close)}</td>
            <td class="${cls(r.pct_chg)}">${pct(r.pct_chg)}</td>
            <td>${r.amount_text || ''}</td>
            <td>${r.entry_date || ''}</td>
            <td>${r.trigger_date || ''}</td>
            <td class="reason" title="${r.reason || ''}">${r.reason || ''}</td>
        </tr>
    `).join('');
}

function render(data) {
    const rows = data.top_rows || [];
    const avgScore = rows.reduce((s, r) => s + Number(r.adaptive_score || r.final_score || 0), 0) / Math.max(1, rows.length);
    const preds = rows.map(r => Number(r.pred_next_day_ret_pct)).filter(Number.isFinite);
    const avgPred = preds.reduce((s, v) => s + v, 0) / Math.max(1, preds.length);
    const fb = data.recent_feedback || {};
    document.getElementById('subtitle').textContent =
        `${data.snapshot_time || ''} 生成；每天 15:30 固定保存快照，后续用次日收益训练排序器`;
    document.getElementById('date').textContent = data.snapshot_date || '-';
    document.getElementById('candidates').textContent = data.candidate_rows ?? '-';
    document.getElementById('avgScore').textContent = fmt(avgScore);
    document.getElementById('avgPred').textContent = preds.length ? pct(avgPred) : '-';
    document.getElementById('avgPred').className = `v ${cls(avgPred)}`;
    document.getElementById('fbAvg').textContent = Number.isFinite(Number(fb.avg_next_ret_pct)) ? pct(fb.avg_next_ret_pct) : '-';
    document.getElementById('fbAvg').className = `v ${cls(fb.avg_next_ret_pct)}`;
    document.getElementById('fbWin').textContent = Number.isFinite(Number(fb.win_rate_pct)) ? pct(fb.win_rate_pct) : '-';
    const model = data.adaptive_model || {};
    document.getElementById('modelBadge').textContent = model.enabled
        ? `自适应模型已启用，样本 ${model.rows}`
        : `自适应模型未启用`;
    document.getElementById('rankNote').textContent = model.enabled
        ? `排序 = 原始模型分 + ${model.weight} * 预测次日收益；训练时间 ${model.trained_at || '-'}。`
        : `当前使用原始模型分排序；保存足够带次日收益的候选样本后会自动启用自适应排序。`;
    const train = data.training || {};
    document.getElementById('trainNote').textContent = train.trained
        ? `本次已训练：样本 ${train.rows}，MAE ${fmt(train.metrics && train.metrics.mae, 4)}，相关 ${fmt(train.metrics && train.metrics.corr, 4)}。`
        : `本次未训练：${train.reason || '样本不足'}。`;
    const signalText = (data.signal_summary || [])
        .map(r => `${r.signal_type || 'unknown'} ${r.count}只`)
        .join('，');
    document.getElementById('signalNote').textContent = signalText || '-';
    fillFilters(data);
    renderTable(rows);
    drawSignalChart(document.getElementById('signalChart'), data.signal_summary || []);
    ['signalFilter', 'search'].forEach(id => {
        document.getElementById(id).addEventListener('input', () => renderTable(rows));
    });
    window.addEventListener('resize', () => drawSignalChart(document.getElementById('signalChart'), data.signal_summary || []));
}

loadData().then(render).catch(err => {
    document.getElementById('subtitle').textContent = '加载失败';
    document.getElementById('error').innerHTML = `<div class="error">${err.message || err}</div>`;
});
</script>
</body>
</html>
