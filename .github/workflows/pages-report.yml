name: Publish Stock Report

on:
  push:
    branches: [main]
    paths:
      - "static/**"
      - "templates/daily_top20.html"
      - "templates/formula_breakout.html"
      - "templates/live_formula_trading.html"
      - "daily_top20_pipeline.py"
      - "formula_breakout_pipeline.py"
      - "live_formula_trading.py"
      - "app.py"
      - ".github/workflows/pages-report.yml"
      - "scripts/run_daily_top20_and_publish.sh"
      - "scripts/run_live_formula_trading_and_publish.sh"
  workflow_dispatch:
  schedule:
    # 16:40 Asia/Shanghai on trading weekdays. GitHub cron uses UTC.
    - cron: "40 8 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check local data availability
        id: local_data
        run: |
          if [ -d data_cache/main_uptrend/hist ] && [ -f model_cache/volume_contraction_breakout_5y_tcn.pt ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Historical cache/model not found in repository; publishing existing static/ report only."
          fi

      - name: Set up Python
        if: steps.local_data.outputs.available == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        if: steps.local_data.outputs.available == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build static report if local data is available
        if: steps.local_data.outputs.available == 'true'
        run: |
          python daily_top20_pipeline.py --run-once --skip-refresh --candidates-file data_cache/daily_top20_snapshots/latest_candidates.csv || true
          python formula_breakout_pipeline.py --run-once || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
