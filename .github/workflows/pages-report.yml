name: Publish Stock Report

on:
  workflow_dispatch:
  schedule:
    # 16:40 Asia/Shanghai on trading weekdays. GitHub cron uses UTC.
    - cron: "40 8 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Build static report if local data is available
        run: |
          if [ -d data_cache/main_uptrend/hist ] && [ -f model_cache/volume_contraction_breakout_5y_tcn.pt ]; then
            python june_top20_backtest.py --device cpu --fast-rule-only
          else
            echo "Historical cache/model not found in repository; publishing existing static/ report only."
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: static

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
