<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股量化因子 - 板块ETF与个股可视化</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0d1117;
            --bg-card: #161b22;
            --bg-hover: #21262d;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-green: #3fb950;
            --accent-red: #f85149;
            --accent-yellow: #d29922;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, sans-serif;
            background: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), #a371f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-meta {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--accent);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card-header::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }

        .card-body {
            padding: 16px 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
        }

        tr:hover {
            background: var(--bg-hover);
        }

        .positive { color: var(--accent-green); }
        .negative { color: var(--accent-red); }
        .neutral { color: var(--text-muted); }

        .loading {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-muted);
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            padding: 16px;
            background: rgba(248,81,73,0.1);
            border: 1px solid var(--accent-red);
            border-radius: 8px;
            color: var(--accent-red);
            margin: 16px 0;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-green { background: rgba(63,185,80,0.2); color: var(--accent-green); }
        .badge-red { background: rgba(248,81,73,0.2); color: var(--accent-red); }

        .full-width { grid-column: 1 / -1; }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            header { flex-direction: column; gap: 16px; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>📊 A股量化因子可视化</h1>
                <p class="header-meta">板块ETF · 行业板块 · 概念板块 · 人气个股</p>
            </div>
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <button class="btn" id="btnRefresh" onclick="loadData()">🔄 刷新数据</button>
                <button class="btn" id="btnTrain" onclick="trainModel()">🤖 训练模型</button>
                <button class="btn" id="btnPredict" onclick="loadPredictions()">📈 5日预测</button>
                <span class="header-meta" id="updateTime"></span>
            </div>
        </header>

        <div class="grid" id="content">
            <div class="loading full-width">正在加载数据...</div>
        </div>
    </div>

    <script>
        const API_BASE = '';

        function formatNum(v) {
            if (v == null || v === '' || isNaN(v)) return '-';
            const n = Number(v);
            if (n >= 1e8) return (n / 1e8).toFixed(2) + '亿';
            if (n >= 1e4) return (n / 1e4).toFixed(2) + '万';
            return n.toFixed(2);
        }

        function formatPct(v) {
            if (v == null || v === '' || isNaN(v)) return '-';
            const n = Number(v);
            const cls = n > 0 ? 'positive' : n < 0 ? 'negative' : 'neutral';
            return `<span class="${cls}">${n > 0 ? '+' : ''}${n.toFixed(2)}%</span>`;
        }

        function renderTable(data, columns, keyMap = {}) {
            if (!data || !data.length) return '<p class="neutral">暂无数据</p>';
            const cols = columns.map(c => typeof c === 'string' ? { key: c, label: c } : c);
            let html = '<div class="table-wrap"><table><thead><tr>';
            cols.forEach(c => html += `<th>${c.label || c.key}</th>`);
            html += '</tr></thead><tbody>';
            data.forEach(row => {
                html += '<tr>';
                cols.forEach(col => {
                    let val = row[col.key] ?? row[keyMap[col.key]];
                    if (col.format === 'pct') val = formatPct(val);
                    else if (col.format === 'num') val = formatNum(val);
                    else if (typeof val === 'number') val = val.toFixed(2);
                    html += `<td>${val}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table></div>';
            return html;
        }

        function renderCards(data) {
            const cards = [];

            if (data.recommended_etfs?.length) {
                cards.push({
                    title: '📈 推荐板块ETF（涨幅>0）',
                    content: renderTable(data.recommended_etfs, [
                        { key: '名称', label: '名称' },
                        { key: '代码', label: '代码' },
                        { key: '最新价', label: '最新价' },
                        { key: '涨跌幅', label: '涨跌幅', format: 'pct' },
                        { key: '成交量', label: '成交量', format: 'num' }
                    ])
                });
            }

            if (data.top_industries?.length) {
                cards.push({
                    title: '🏭 涨幅靠前行业板块',
                    content: renderTable(data.top_industries, [
                        { key: '板块名称', label: '板块' },
                        { key: '涨跌幅', label: '涨跌幅', format: 'pct' },
                        { key: '领涨股票', label: '领涨股' },
                        { key: '上涨家数', label: '上涨' },
                        { key: '下跌家数', label: '下跌' }
                    ])
                });
            }

            if (data.top_concepts?.length) {
                cards.push({
                    title: '💡 涨幅靠前概念板块',
                    content: renderTable(data.top_concepts, [
                        { key: '板块名称', label: '概念' },
                        { key: '涨跌幅', label: '涨跌幅', format: 'pct' },
                        { key: '领涨股票', label: '领涨股' },
                        { key: '上涨家数', label: '上涨' },
                        { key: '下跌家数', label: '下跌' }
                    ])
                });
            }

            if (data.fund_flow?.length) {
                const ff = data.fund_flow[0] || {};
                const inflowKey = '今日主力净流入-净额' in ff ? '今日主力净流入-净额' : '今日主力净流入';
                const pctKey = '今日主力净流入-净占比' in ff ? '今日主力净流入-净占比' : '今日主力净流入占比';
                cards.push({
                    title: '💰 行业资金流排名（今日）',
                    content: renderTable(data.fund_flow.slice(0, 15), [
                        { key: '名称', label: '行业' },
                        { key: '今日涨跌幅', label: '涨跌幅', format: 'pct' },
                        { key: inflowKey, label: '主力净流入', format: 'num' },
                        { key: pctKey, label: '净流入占比' }
                    ])
                });
            }

            if (data.hot_stocks?.length) {
                cards.push({
                    title: '🔥 人气榜个股',
                    content: renderTable(data.hot_stocks.slice(0, 15), [
                        { key: '当前排名', label: '排名' },
                        { key: '股票名称', label: '名称' },
                        { key: '代码', label: '代码' },
                        { key: '最新价', label: '最新价' },
                        { key: '涨跌幅', label: '涨跌幅', format: 'pct' }
                    ])
                });
            }

            if (data.recommended_stocks?.length) {
                cards.push({
                    title: '⭐ 板块领涨股推荐',
                    content: renderTable(data.recommended_stocks, [
                        { key: '板块', label: '板块' },
                        { key: '领涨股', label: '领涨股' },
                        { key: '涨跌幅', label: '涨跌幅', format: 'pct' }
                    ])
                });
            }

            if (data.sector_etfs?.length && !data.recommended_etfs?.length) {
                cards.push({
                    title: '📊 板块ETF行情',
                    content: renderTable(data.sector_etfs.slice(0, 20), [
                        { key: '名称', label: '名称' },
                        { key: '代码', label: '代码' },
                        { key: '最新价', label: '最新价' },
                        { key: '涨跌幅', label: '涨跌幅', format: 'pct' }
                    ])
                });
            }

            if (cards.length === 0) {
                return '<div class="card full-width"><div class="card-body"><p class="neutral">暂无数据，请检查网络或稍后重试</p></div></div>';
            }

            return cards.map(c => `
                <div class="card">
                    <div class="card-header">${c.title}</div>
                    <div class="card-body">${c.content}</div>
                </div>
            `).join('');
        }

        async function loadData() {
            const el = document.getElementById('content');
            const btn = document.getElementById('btnRefresh');
            const timeEl = document.getElementById('updateTime');

            el.innerHTML = '<div class="loading full-width">正在加载数据...</div>';
            btn.disabled = true;

            try {
                let res = await fetch(API_BASE + '/api/data');
                let data = await res.json();
                if (data.error || (!data.hot_stocks?.length && !data.sector_etfs?.length)) {
                    res = await fetch(API_BASE + '/api/cached');
                    if (res.ok) data = await res.json();
                }
                if (data.error) {
                    el.innerHTML = `<div class="error full-width">${data.message || data.error}</div>`;
                    return;
                }

                el.innerHTML = renderCards(data);
                timeEl.textContent = '更新: ' + (data.update_time || '—').slice(0, 19).replace('T', ' ');
            } catch (err) {
                try {
                    const res = await fetch(API_BASE + '/api/cached');
                    if (res.ok) {
                        const data = await res.json();
                        el.innerHTML = renderCards(data);
                        timeEl.textContent = '缓存: ' + (data.update_time || '—').slice(0, 19).replace('T', ' ');
                        return;
                    }
                } catch (_) {}
                el.innerHTML = `<div class="error full-width">请求失败: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        async function trainModel() {
            const btn = document.getElementById('btnTrain');
            btn.disabled = true;
            btn.textContent = '训练中...';
            try {
                const res = await fetch(API_BASE + '/api/train');
                const data = await res.json();
                alert(data.error ? ('训练失败: ' + data.message) : ('训练完成！准确率: ' + (data.accuracy * 100).toFixed(2) + '%'));
            } catch (err) {
                alert('训练请求失败: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '🤖 训练模型';
            }
        }

        async function loadPredictions() {
            const el = document.getElementById('content');
            const btn = document.getElementById('btnPredict');
            btn.disabled = true;
            el.innerHTML = '<div class="loading full-width">正在计算5日涨跌概率...</div>';
            try {
                const res = await fetch(API_BASE + '/api/predict');
                const data = await res.json();
                if (data.message && res.status === 400) {
                    el.innerHTML = `<div class="card full-width"><div class="card-body"><p class="neutral">${data.message}</p><button class="btn" onclick="trainModel()">先去训练模型</button></div></div>`;
                    return;
                }
                if (data.error) {
                    el.innerHTML = `<div class="error full-width">${data.message || data.error}</div>`;
                    return;
                }
                const preds = data.predictions || [];
                const html = `
                    <div class="card full-width">
                        <div class="card-header">📈 未来5日涨跌概率预测</div>
                        <div class="card-body">
                            ${preds.length ? `
                            <div class="table-wrap"><table>
                                <thead><tr><th>股票</th><th>代码</th><th>涨概率</th><th>跌概率</th><th>建议</th></tr></thead>
                                <tbody>
                                    ${preds.map(p => `
                                    <tr>
                                        <td>${p.name}</td>
                                        <td>${p.code}</td>
                                        <td class="positive">${p.prob_up}%</td>
                                        <td class="negative">${p.prob_down}%</td>
                                        <td>${p.suggest}</td>
                                    </tr>
                                    `).join('')}
                                </tbody>
                            </table></div>
                            ` : '<p class="neutral">暂无预测结果，请先刷新数据并训练模型</p>'}
                            <p class="header-meta" style="margin-top:12px">更新: ${(data.update_time || '').slice(0,19).replace('T',' ')}</p>
                        </div>
                    </div>
                `;
                el.innerHTML = html;
            } catch (err) {
                el.innerHTML = `<div class="error full-width">预测失败: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>
</html>
